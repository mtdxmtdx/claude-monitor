name: claude_monitor
description: Claude Code 远程监控客户端

publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^2.4.0   # WebSocket 客户端
  xterm: ^4.0.0                # 终端渲染（支持 ANSI/VT100）
  shared_preferences: ^2.2.0   # 持久化 IP 配置

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/

flutter_launcher_icons:
  android: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  min_sdk_android: 21
